version: 2

project_name: uptime-kuma-cli

changelog:
  disable: true

builds:
  - id: uptimekuma
    main: ./cmd/uptimekuma
    binary: uptime-kuma-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/uptime-kuma-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/uptime-kuma-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/uptime-kuma-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
  - id: uptimekuma_darwin
    main: ./cmd/uptimekuma
    binary: uptime-kuma-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/uptime-kuma-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/uptime-kuma-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/uptime-kuma-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=1
    targets:
      - darwin_amd64
      - darwin_arm64

archives:
  - ids:
      - uptimekuma
      - uptimekuma_darwin
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
